<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Cost by Department</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Cost by Department</h1>
    <a href="{% url 'asset_list' %}" class="btn btn-primary">
        📋 View Assets
    </a>
</div>

        <!-- Table Version -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>Department</th>
                            <th>Total Asset Cost</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for dept in department_costs %}
                        <tr>
                            <td>{{ dept.name }}</td>
                            <td>₱ {{ dept.total_cost|default:"0" }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Optional Card Layout -->
        <div class="row mt-5">
            {% for dept in department_costs %}
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-primary h-100 shadow">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <h5 class="card-title">{{ dept.name }}</h5>
                        <p class="card-text fs-4">₱ {{ dept.total_cost|default:"0" }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- Bootstrap JS (optional for responsiveness) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
